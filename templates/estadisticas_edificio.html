<!DOCTYPE html>
<html>
<head>
    <title>Actividades por Edificio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family:Arial; margin:40px; }
        select, input { padding:5px; }
    </style>
</head>
<body>

    <div style="margin-bottom:25px;">
    <a href="/">
        <button type="button">Nueva Guía</button>
    </a>

    <a href="/reportes">
        <button type="button">Reportes</button>
    </a>

    <a href="/estadisticas">
        <button type="button">Estadísticas Técnicos</button>
    </a>

    <a href="/estadisticas_edificio">
        <button type="button">Estadísticas Edificios</button>
    </a>
</div>

<h2>Actividades por Edificio</h2>

<a href="/">Nueva Guía</a> |
<a href="/reportes">Reportes</a> |
<a href="/estadisticas">Por Técnico</a>

<br><br>

<form method="GET">
    Desde:
    <input type="date" name="inicio" value="{{ inicio }}">
    Hasta:
    <input type="date" name="fin" value="{{ fin }}">

    Tipo gráfico:
    <select id="tipoGrafico">
        <option value="bar">Barra</option>
        <option value="pie">Torta</option>
        <option value="doughnut">Dona</option>
        <option value="line">Línea</option>
    </select>

    <button type="submit">Generar</button>
</form>

<br><br>

<div style="width:30%; margin:auto;">
    <canvas id="grafico"></canvas>
</div>

<script>

const labels = {{ labels | tojson }};
const valores = {{ valores | tojson }};

let chartActual = null;

function generarGrafico(tipo) {

    const ctx = document.getElementById('grafico').getContext('2d');

    if (chartActual) {
        chartActual.destroy();
    }

    chartActual = new Chart(ctx, {
        type: tipo,
        data: {
            labels: labels,
            datasets: [{
                label: 'Cantidad de Actividades',
                data: valores,
                backgroundColor: [
                    '#0072CE',
                    '#00c3ff',
                    '#ff6384',
                    '#36a2eb',
                    '#ffce56',
                    '#4bc0c0',
                    '#9966ff',
                    '#ff9f40',
                    '#2ecc71',
                    '#e74c3c',
                    '#8e44ad',
                    '#f1c40f'
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true,
                    position: tipo === 'pie' || tipo === 'doughnut' ? 'right' : 'top'
                }
            },
            scales: (tipo === 'bar' || tipo === 'line') ? {
                y: { beginAtZero: true }
            } : {}
        }
    });
}

// gráfico inicial
generarGrafico("bar");

// cambiar dinámicamente
document.getElementById("tipoGrafico")
        .addEventListener("change", function() {
            generarGrafico(this.value);
        });

</script>

</body>
</html>
