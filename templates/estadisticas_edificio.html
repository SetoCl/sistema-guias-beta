<!DOCTYPE html>
<html>

<head>

<title>Estadísticas Edificios</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="layout">

<div class="sidebar">

<h2>Fibratel</h2>

<a href="/">Inicio</a>
<a href="/reportes">Reportes</a>
<a href="/estadisticas">Est. Técnicos</a>
<a href="/estadisticas_edificio">Est. Edificios</a>
<a href="/mantenciones">Mantenciones</a>

</div>

<div class="main">

<div class="header">
<h2>Actividades por Edificio</h2>
</div>

<div class="dashboard">

<div class="card">
<h3>Total actividades</h3>
<p>{{ total }}</p>
</div>

<div class="card">
<h3>Edificios activos</h3>
<p>{{ edificios }}</p>
</div>

<div class="card">
<h3>Promedio</h3>
<p>{{ promedio }}</p>
</div>

<div class="card">
<h3>Edificio líder</h3>
<p>{{ lider }}</p>
</div>

</div>

<div class="form-box">

<form method="GET">

<label>Desde</label>
<input type="date" name="inicio" value="{{ inicio }}">

<label>Hasta</label>
<input type="date" name="fin" value="{{ fin }}">

<label>Tipo de gráfico</label>

<select id="tipoGrafico">

<option value="bar">Barra</option>
<option value="pie">Torta</option>
<option value="doughnut">Dona</option>
<option value="line">Línea</option>

</select>

<button type="submit">Generar</button>

</form>

</div>

<div class="chart-box">

<canvas id="grafico"></canvas>

</div>

</div>
</div>

<script>

const labels={{labels|tojson}};
const valores={{valores|tojson}};

let chartActual=null;

function generarGrafico(tipo){

const ctx=document.getElementById("grafico").getContext("2d");

if(chartActual){
chartActual.destroy();
}

chartActual=new Chart(ctx,{

type:tipo,

data:{
labels:labels,
datasets:[{
label:"Actividades",
data:valores,
backgroundColor:[
"#0072CE",
"#00c3ff",
"#ff6384",
"#36a2eb",
"#ffce56",
"#4bc0c0",
"#9966ff",
"#ff9f40"
]
}]
},

options:{
responsive:true,
plugins:{
legend:{position:"right"}
},
scales:(tipo==="bar"||tipo==="line")?{
y:{beginAtZero:true}
}:{}
}

});

}

generarGrafico("bar");

document.getElementById("tipoGrafico")
.addEventListener("change",function(){
generarGrafico(this.value);
});

</script>

</body>
</html>
