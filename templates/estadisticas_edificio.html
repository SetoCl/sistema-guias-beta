{% extends "base.html" %}

{% block contenido %}

<div class="header">
<h2>Actividades por Edificio</h2>
</div>

<!-- FILTRO -->
<div class="form-box">

<form method="GET" style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">

<label>Desde</label>
<input type="date" name="inicio"
value="{{ inicio or '' }}"
style="width:150px;">

<label>Hasta</label>
<input type="date" name="fin"
value="{{ fin or '' }}"
style="width:150px;">

<button type="submit">Filtrar</button>

</form>

</div>

<div class="dashboard">

<div class="card">
<h3>Total actividades</h3>
<p>{{ total }}</p>
</div>

<div class="card">
<h3>Edificios activos</h3>
<p>{{ edificios }}</p>
</div>

<div class="card">
<h3>Promedio</h3>
<p>{{ promedio }}</p>
</div>

<div class="card">
<h3>Edificio líder</h3>
<p>{{ lider }}</p>
</div>

</div>

<div class="chart-box">

<select id="tipoGrafico">

<option value="bar">Barras</option>
<option value="pie">Torta</option>
<option value="doughnut">Dona</option>
<option value="line">Línea</option>

</select>

<canvas id="grafico"></canvas>

</div>

{% endblock %}


{% block scripts %}

<script>

const labels={{labels|tojson}};
const valores={{valores|tojson}};

let chartActual=null;

function generarGrafico(tipo){

const ctx=document.getElementById("grafico").getContext("2d");

if(chartActual){
chartActual.destroy();
}

chartActual=new Chart(ctx,{

type:tipo,

data:{
labels:labels,
datasets:[{
label:"Actividades",
data:valores,
backgroundColor:[
"#0072CE",
"#00c3ff",
"#ff6384",
"#36a2eb",
"#ffce56",
"#4bc0c0",
"#9966ff"
]
}]
},

options:{
responsive:true,
plugins:{
legend:{position:"right"}
},
scales:(tipo==="bar"||tipo==="line")?{
y:{beginAtZero:true}
}:{}
}

});

}

generarGrafico("bar");

document.getElementById("tipoGrafico")
.addEventListener("change",function(){
generarGrafico(this.value);
});

</script>

{% endblock %}
