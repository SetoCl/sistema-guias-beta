<!DOCTYPE html>
<html>

<head>

<title>Ingreso Sistema</title>

<style>

body{
background:#f4f6f9;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#0072CE;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sistema Fibratel</h2>

<form method="POST">

<input name="username" placeholder="Usuario">

<input type="password" name="password" placeholder="Contraseña">

<button type="submit">Ingresar</button>

</form>

</div>

</body>
</html>
