<!DOCTYPE html>
<html>

<head>

<title>Reportes</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Fibratel</h2>

<a href="/">Nueva Guía</a>
<a href="/reportes">Reportes</a>
<a href="/estadisticas">Est. Técnicos</a>
<a href="/estadisticas_edificio">Est. Edificios</a>

</div>

<!-- CONTENIDO -->

<div class="main">

<div class="header">
<h2>Reportes de Guías</h2>
</div>

<!-- FILTRO -->

<div class="form-box">

<form method="GET">

<label>Estado</label>

<select name="estado">

<option value="">Todos</option>

<option value="En Proceso"
{% if request.args.get("estado")=="En Proceso" %}selected{% endif %}>
En Proceso
</option>

<option value="Pendiente Firma"
{% if request.args.get("estado")=="Pendiente Firma" %}selected{% endif %}>
Pendiente Firma
</option>

<option value="Cerrada"
{% if request.args.get("estado")=="Cerrada" %}selected{% endif %}>
Cerrada
</option>

</select>

<button type="submit">Filtrar</button>

</form>

</div>

<!-- TABLA -->

<div class="form-box">

<table>

<tr>
<th>N°</th>
<th>Fecha</th>
<th>Cliente</th>
<th>Técnicos</th>
<th>Estado</th>
<th>PDF</th>
</tr>

{% for g in guias %}

<tr>

<td>{{ g.numero_guia }}</td>

<td>{{ g.fecha }}</td>

<td>{{ g.cliente }}</td>

<td>{{ g.tecnicos }}</td>

<td>{{ g.estado }}</td>

<td>

<a href="/pdf/{{ g.id }}" target="_blank">
<button type="button">Ver PDF</button>
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</div>

</body>
</html>
