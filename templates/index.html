{% extends "base.html" %}

{% block contenido %}

<div class="header">

<h1 class="titulo-sistema">
Sistema de Control de Guías
</h1>

<!-- DASHBOARD -->

<div class="dashboard">

<div class="card">
<h3>Guías abiertas</h3>
<p>{{ abiertas }}</p>
</div>

<div class="card">
<h3>Guías cerradas</h3>
<p>{{ cerradas }}</p>
</div>

<div class="card">
<h3>Hoy</h3>
<p>{{ hoy }}</p>
</div>

<div class="card">
<h3>Técnico líder</h3>
<p>{{ lider }}</p>
</div>

</div>

</div>


<!-- FORMULARIO -->

<div class="form-box">

<form method="POST">

<input type="hidden" name="guia_id" value="{{ guia.id if guia else '' }}">

<!-- GUIA Y FECHA -->

<div class="form-line">

<div class="form-group">
<label>N° Guía</label>
<input type="text"
value="{{ guia.numero_guia if guia else proximo_numero }}"
readonly>
</div>

<div class="form-group">
<label>Fecha</label>
<input type="date"
name="fecha"
value="{{ guia.fecha if guia else fecha }}">
</div>

</div>


<!-- CLIENTE -->

<div class="form-group">

<label>Cliente</label>

<select name="cliente_id" id="cliente" onchange="cargarCliente()">

<option value="">Seleccione cliente</option>

{% for c in clientes %}
<option value="{{ c.id }}"
{% if guia and guia.cliente_id == c.id %}selected{% endif %}>
{{ c.nombre }}
</option>
{% endfor %}

</select>

</div>


<!-- DIRECCION -->

<div class="form-group">

<label>Dirección</label>

<input type="text"
id="direccion"
value="{{ guia.direccion if guia else '' }}"
readonly>

</div>


<!-- PROPERTY -->

<div class="form-group">

<label>Property</label>

<input type="text"
id="property"
value="{{ guia.property if guia else '' }}"
readonly>

</div>


<!-- TIPO DE TRABAJO Y TECNICOS -->

<div class="form-line">

<div class="form-group">

<label>Tipo de Trabajo</label>

<select name="tipo_trabajo" id="tipo_trabajo" onchange="tipoTrabajo()">

<option value="">Seleccione</option>

<option value="MANTENCION"
{% if guia and guia.tipo_trabajo == "MANTENCION" %}selected{% endif %}>
Mantención
</option>

<option value="ENTREGATRABAJO"
{% if guia and guia.tipo_trabajo == "ENTREGATRABAJO" %}selected{% endif %}>
Entrega de Trabajo
</option>

<option value="INSTALACION"
{% if guia and guia.tipo_trabajo == "INSTALACION" %}selected{% endif %}>
Instalación
</option>

<option value="REPARACION"
{% if guia and guia.tipo_trabajo == "REPARACION" %}selected{% endif %}>
Reparación
</option>

<option value="GARANTIA"
{% if guia and guia.tipo_trabajo == "GARANTIA" %}selected{% endif %}>
Garantía
</option>

</select>

</div>


<div class="form-group">

<label>Técnicos</label>

<select id="tecnico_select">

<option value="">Seleccione técnico</option>

{% for t in tecnicos %}
<option value="{{ t.nombre }}">{{ t.nombre }}</option>
{% endfor %}

</select>

</div>


<button type="button" onclick="agregarTecnico()">Agregar</button>

</div>


<!-- LISTA TECNICOS -->

<div class="form-group">

<label>Técnicos asignados</label>

<input type="text"
id="lista_tecnicos"
name="tecnicos"
value="{{ guia.tecnicos if guia else '' }}">

</div>


<!-- DESCRIPCION -->

<div class="form-group">

<label>Descripción</label>

<textarea name="descripcion" id="descripcion">
{{ guia.descripcion if guia else '' }}
</textarea>

</div>


<!-- OBSERVACIONES -->

<div class="form-group">

<label>Observaciones</label>

<textarea name="observaciones">
{{ guia.observaciones if guia else '' }}
</textarea>

</div>


<button type="submit">

{% if guia %}
Actualizar
{% else %}
Guardar
{% endif %}

</button>

</form>

</div>


<script>

function cargarCliente(){

const clienteId=document.getElementById("cliente").value;

if(!clienteId){

document.getElementById("direccion").value="";
document.getElementById("property").value="";
return;

}

fetch("/api/cliente/"+clienteId)

.then(response=>response.json())

.then(data=>{

document.getElementById("direccion").value=data.direccion||"";
document.getElementById("property").value=data.property||"";

});

}


function agregarTecnico(){

const select=document.getElementById("tecnico_select");
const tecnico=select.value;

if(!tecnico) return;

const campo=document.getElementById("lista_tecnicos");

if(campo.value===""){
campo.value=tecnico;
}
else{

const lista=campo.value.split(", ");

if(!lista.includes(tecnico)){
campo.value+=", "+tecnico;
}

}

}


function tipoTrabajo(){

const tipo=document.getElementById("tipo_trabajo").value;

const descripcion=document.getElementById("descripcion");

if(tipo==="MANTENCION"){

descripcion.value =
"Se realiza mantencion preventiva:\n\n"+
"- Sistema CCTV\n"+
"- Sistema de Citofonia\n"+
"- Sistema de Deteccion de Incendios\n"+
"- Sistema de Control de acceso\n"+
"- Revision de funcionamiento de porton vehicular\n"+
"- Revision de funcionamiento de retenedores\n"+
"- Revision de funcionamiento de bicicleteros\n"+
"- Chequeo de fuentes de poder y alimentacion en general";

}

}

</script>

{% endblock %}
