<!DOCTYPE html>
<html>

<head>

<title>Control de Guías</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="layout">

<div class="sidebar">

<h2>Fibratel</h2>

<a href="/">Nueva Guía</a>
<a href="/reportes">Reportes</a>
<a href="/estadisticas">Est. Técnicos</a>
<a href="/estadisticas_edificio">Est. Edificios</a>

</div>

<div class="main">

<div class="header">
<h2>Control de Guías</h2>
</div>

<div class="form-box">

<form method="POST">

<input type="hidden" name="guia_id" value="{{ guia.id if guia else '' }}">

<label>N° Guía</label>
<input type="text"
value="{{ guia.numero_guia if guia else proximo_numero }}"
readonly>

<label>Fecha</label>
<input type="date"
name="fecha"
value="{{ guia.fecha if guia else fecha }}">

<label>Cliente</label>

<select name="cliente_id" id="cliente" onchange="cargarCliente()">

<option value="">Seleccione cliente</option>

{% for c in clientes %}
<option value="{{ c.id }}"
{% if guia and guia.cliente_id == c.id %}selected{% endif %}>
{{ c.nombre }}
</option>
{% endfor %}

</select>

<label>Dirección</label>
<input type="text"
id="direccion"
value="{{ guia.direccion if guia else '' }}"
readonly>

<label>Property</label>
<input type="text"
id="property"
value="{{ guia.property if guia else '' }}"
readonly>

<label>Técnicos</label>

<select id="tecnico_select">
<option value="">Seleccione técnico</option>

{% for t in tecnicos %}
<option value="{{ t.nombre }}">{{ t.nombre }}</option>
{% endfor %}

</select>

<button type="button" onclick="agregarTecnico()">Agregar</button>

<input type="text"
id="lista_tecnicos"
name="tecnicos"
value="{{ guia.tecnicos if guia else '' }}">

<label>Descripción</label>
<textarea name="descripcion">{{ guia.descripcion if guia else '' }}</textarea>

<label>Estado</label>

<select name="estado">

<option value="En Proceso"
{% if guia and guia.estado == "En Proceso" %}selected{% endif %}>
En Proceso
</option>

<option value="Pendiente Firma"
{% if guia and guia.estado == "Pendiente Firma" %}selected{% endif %}>
Pendiente Firma
</option>

<option value="Cerrada"
{% if guia and guia.estado == "Cerrada" %}selected{% endif %}>
Cerrada
</option>

</select>

<label>Observaciones</label>
<textarea name="observaciones">{{ guia.observaciones if guia else '' }}</textarea>

<button type="submit">
{% if guia %}Actualizar{% else %}Guardar{% endif %}
</button>

</form>

</div>

</div>
</div>

<script>

function cargarCliente(){

const clienteId=document.getElementById("cliente").value;

if(!clienteId){

document.getElementById("direccion").value="";
document.getElementById("property").value="";
return;

}

fetch("/api/cliente/"+clienteId)

.then(response=>response.json())

.then(data=>{

document.getElementById("direccion").value=data.direccion||"";
document.getElementById("property").value=data.property||"";

});

}

function agregarTecnico(){

const select=document.getElementById("tecnico_select");
const tecnico=select.value;

if(!tecnico) return;

const campo=document.getElementById("lista_tecnicos");

if(campo.value===""){
campo.value=tecnico;
}
else{

const lista=campo.value.split(", ");

if(!lista.includes(tecnico)){
campo.value+=", "+tecnico;
}

}

}

</script>

</body>
</html>
